<script>
const F   = 570;
const PAD = 20;
const CW  = F + PAD*2;
const CH  = F + PAD*2;
const T   = F / 6;

const canvas = document.getElementById('c');
canvas.width  = CW;
canvas.height = CH;
const ctx = canvas.getContext('2d');

// Goal: bottom-right corner (blue triangle)
// In field coords (0,0)=top-left, (F,F)=bottom-right
const GOAL = { x: F, y: F };  // bottom-right corner

const robot = { x: F*0.35, y: F*0.38 };
let velVec  = { x: 1.2, y: 1.5 };

const PROJ_SPEED = 5.5;
const VEL_DISP   = 68;

// Math helpers
const vlen  = v => Math.sqrt(v.x*v.x+v.y*v.y);
const vnorm = v => { const l=vlen(v)||1; return {x:v.x/l,y:v.y/l}; };
const vsc   = (v,s) => ({x:v.x*s,y:v.y*s});
const vadd  = (a,b) => ({x:a.x+b.x,y:a.y+b.y});
const vsub  = (a,b) => ({x:a.x-b.x,y:a.y-b.y});
const vdot  = (a,b) => a.x*b.x+a.y*b.y;
const vdist = (a,b) => vlen(vsub(a,b));

function computeVirtualGoal(rPos, gPos, vel) {
  const toGoal = vsub(gPos, rPos);
  const d      = vnorm(toGoal);
  const vPerp  = vsub(vel, vsc(d, vdot(vel,d)));
  const pm     = Math.min(vlen(vPerp), PROJ_SPEED*0.99);
  const tPerp  = vsc(vPerp, -1/PROJ_SPEED);
  const tPar   = Math.sqrt(Math.max(0, 1 - pm*pm/(PROJ_SPEED*PROJ_SPEED)));
  const turret = vnorm(vadd(vsc(d,tPar), tPerp));
  const vg     = vadd(rPos, vsc(turret, 500));
  return { turret, vg };
}

function velTipPos() {
  const s    = vlen(velVec);
  const disp = Math.max(26, Math.min(160, s*VEL_DISP));
  const dir  = s>0.001 ? vnorm(velVec) : {x:1,y:0};
  return vadd(robot, vsc(dir, disp));
}

let cVelTip = {x:0,y:0};

// clamp ray to canvas bounds
function clampRay(ox,oy,dx,dy,maxLen){
  let t=maxLen;
  if(dx>0.0001)  t=Math.min(t,(CW-ox)/dx);
  if(dx<-0.0001) t=Math.min(t,(0-ox)/dx);
  if(dy>0.0001)  t=Math.min(t,(CH-oy)/dy);
  if(dy<-0.0001) t=Math.min(t,(0-oy)/dy);
  return {x:ox+dx*Math.max(0,t), y:oy+dy*Math.max(0,t)};
}

// ── Drawing ──────────────────────────────────────────────────
function drawField() {
  const ox=PAD, oy=PAD;

  // Black background
  ctx.fillStyle='#000';
  ctx.fillRect(ox, oy, F, F);

  // Tile grid — subtle dark lines
  ctx.save();
  ctx.strokeStyle='#111';
  ctx.lineWidth=0.8;
  for(let i=0;i<=6;i++){
    ctx.beginPath(); ctx.moveTo(ox+i*T,oy); ctx.lineTo(ox+i*T,oy+F); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox,oy+i*T); ctx.lineTo(ox+F,oy+i*T); ctx.stroke();
  }
  ctx.restore();

  // ── Blue triangle in bottom-right corner (= Real Goal) ──
  // Spans 2 tiles from corner
  const ts = T * 2;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ox+F,      oy+F);       // corner
  ctx.lineTo(ox+F-ts,   oy+F);       // left along bottom
  ctx.lineTo(ox+F,      oy+F-ts);    // up along right
  ctx.closePath();
  ctx.fillStyle   = 'rgba(30,80,220,0.75)';
  ctx.fill();
  ctx.strokeStyle = '#3b8eff';
  ctx.lineWidth   = 2;
  ctx.shadowColor = 'rgba(59,142,255,0.6)';
  ctx.shadowBlur  = 14;
  ctx.stroke();
  ctx.restore();

  // Field border
  ctx.save();
  ctx.strokeStyle='#222';
  ctx.lineWidth=2;
  ctx.strokeRect(ox,oy,F,F);
  ctx.restore();
}

function arrowLine(x1,y1,x2,y2,color,dashed,lw){
  ctx.save();
  ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=lw||2;
  ctx.setLineDash(dashed?[7,5]:[]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.setLineDash([]);
  const a=Math.atan2(y2-y1,x2-x1),h=11;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-h*Math.cos(a-0.4),y2-h*Math.sin(a-0.4));
  ctx.lineTo(x2-h*Math.cos(a+0.4),y2-h*Math.sin(a+0.4));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawRobot(px,py,turretAngle){
  ctx.save();
  ctx.translate(px,py);
  // body
  ctx.shadowColor='rgba(0,212,255,0.35)'; ctx.shadowBlur=16;
  ctx.fillStyle='#1a2a4a'; ctx.strokeStyle='#00d4ff'; ctx.lineWidth=1.5;
  ctx.fillRect(-20,-20,40,40); ctx.strokeRect(-20,-20,40,40);
  ctx.shadowBlur=0;
  // team label
  ctx.fillStyle='rgba(0,212,255,0.55)';
  ctx.font='bold 6px Share Tech Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('17962',0,0);
  // turret
  ctx.rotate(turretAngle);
  ctx.fillStyle='#0a1628'; ctx.strokeStyle='#00d4ff'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#00d4ff';
  ctx.fillRect(6,-2.5,15,5);
  ctx.beginPath(); ctx.arc(0,0,2.5,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();
}

function drawVelHandle(px,py){
  ctx.save();
  ctx.beginPath(); ctx.arc(px,py,9,0,Math.PI*2);
  ctx.fillStyle='#ff8c00';
  ctx.shadowColor='rgba(255,140,0,0.8)'; ctx.shadowBlur=14;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);

  drawField();

  const rC = {x:PAD+robot.x, y:PAD+robot.y};
  const gC = {x:PAD+GOAL.x,  y:PAD+GOAL.y};

  const {turret, vg} = computeVirtualGoal(robot, GOAL, velVec);
  const vgEnd = clampRay(rC.x, rC.y, turret.x, turret.y, 500);

  const worldDir  = vnorm(vadd(vsc(turret, PROJ_SPEED), velVec));
  const resultEnd = clampRay(rC.x, rC.y, worldDir.x, worldDir.y, 500);

  const vtR = velTipPos();
  const vtC = {x:PAD+vtR.x, y:PAD+vtR.y};
  cVelTip   = vtC;

  // Resultant (green, behind)
  ctx.save(); ctx.globalAlpha=0.5;
  arrowLine(rC.x,rC.y,resultEnd.x,resultEnd.y,'#00ff88',false,1.8);
  ctx.restore();

  // Blue dashed → real goal
  arrowLine(rC.x,rC.y,gC.x,gC.y,'#3b8eff',true,2);

  // Red dashed → virtual goal
  arrowLine(rC.x,rC.y,vgEnd.x,vgEnd.y,'#ff3b3b',true,2);

  // Orange solid = velocity
  arrowLine(rC.x,rC.y,vtC.x,vtC.y,'#ff8c00',false,2.5);

  // Virtual goal triangle (green dot at turret end)
  const vgAngle = Math.atan2(rC.y-vgEnd.y, rC.x-vgEnd.x);
  ctx.save();
  ctx.translate(vgEnd.x,vgEnd.y); ctx.rotate(vgAngle);
  ctx.beginPath();
  ctx.moveTo(14,0); ctx.lineTo(-10,-11); ctx.lineTo(-10,11);
  ctx.closePath();
  ctx.fillStyle='#00cc66';
  ctx.shadowColor='rgba(0,255,136,0.5)'; ctx.shadowBlur=12;
  ctx.fill();
  ctx.restore();

  // Labels
  ctx.save();
  ctx.font='bold 11px Share Tech Mono, monospace';
  ctx.shadowBlur=0;

  // Real goal label near corner
  ctx.fillStyle='#5599ff'; ctx.textAlign='right';
  ctx.fillText('REAL GOAL', gC.x-6, gC.y-60);

  // Virtual goal label
  ctx.fillStyle='#00ff88'; ctx.textAlign='left';
  const lx=Math.min(vgEnd.x+8, CW-115);
  const ly=Math.max(vgEnd.y-8, 14);
  ctx.fillText('VIRTUAL GOAL', lx, ly);

  // Speed + angle
  ctx.fillStyle='#ff8c00';
  const spd=(vlen(velVec)).toFixed(2);
  const ang=(Math.atan2(velVec.y,velVec.x)*180/Math.PI).toFixed(0);
  ctx.fillText('v='+spd+'  θ='+ang+'°', vtC.x+10, vtC.y-4);
  ctx.restore();

  drawRobot(rC.x, rC.y, Math.atan2(turret.y, turret.x));
  drawVelHandle(vtC.x, vtC.y);
}

function tick(){
  robot.x+=velVec.x; robot.y+=velVec.y;
  if(robot.x<0)    {robot.x=0;    velVec.x= Math.abs(velVec.x);}
  if(robot.x>F)    {robot.x=F;    velVec.x=-Math.abs(velVec.x);}
  if(robot.y<0)    {robot.y=0;    velVec.y= Math.abs(velVec.y);}
  if(robot.y>F)    {robot.y=F;    velVec.y=-Math.abs(velVec.y);}
}

function loop(){tick();render();requestAnimationFrame(loop);}

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const sx=CW/r.width, sy=CH/r.height;
  const ex=e.touches?e.touches[0].clientX:e.clientX;
  const ey=e.touches?e.touches[0].clientY:e.clientY;
  return {x:(ex-r.left)*sx, y:(ey-r.top)*sy};
}

let dragging=null;
canvas.addEventListener('mousedown',e=>{ if(vdist(getPos(e),cVelTip)<18) dragging='vel'; });
canvas.addEventListener('touchstart',e=>{ if(vdist(getPos(e),cVelTip)<22) dragging='vel'; },{passive:true});

canvas.addEventListener('mousemove',e=>{
  const p=getPos(e);
  if(dragging==='vel'){
    const rC={x:PAD+robot.x,y:PAD+robot.y};
    const raw=vsub(p,rC);
    const d=vlen(raw);
    velVec=d<1?{x:0,y:0}:vsc(vnorm(raw),d/VEL_DISP);
  }
  canvas.style.cursor=vdist(p,cVelTip)<18?'pointer':'default';
});
canvas.addEventListener('touchmove',e=>{
  const p=getPos(e);
  if(dragging==='vel'){
    const rC={x:PAD+robot.x,y:PAD+robot.y};
    const raw=vsub(p,rC);
    const d=vlen(raw);
    velVec=d<1?{x:0,y:0}:vsc(vnorm(raw),d/VEL_DISP);
  }
},{passive:true});

canvas.addEventListener('mouseup', ()=>dragging=null);
canvas.addEventListener('touchend',()=>dragging=null);

document.getElementById('btnReset').addEventListener('click',()=>{
  robot.x=F*0.35; robot.y=F*0.38;
  velVec={x:1.2,y:1.5};
});

loop();
</script>
</body>
</html>
